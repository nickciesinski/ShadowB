name: Trigger 14 — Nightly Optimization Cycle

on:
  schedule:
    - cron: '30 4 * * *'  # 11:30 PM ET (UTC-5)
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - name: Run full optimization cycle
        run: node src/triggers.js trigger14
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NODE_ENV: production

      - name: Commit tuned model params
        run: |
          git config user.name "shadow-bets-bot"
          git config user.email "shadow-bets-bot@users.noreply.github.com"
          git add config/model-params.*.json
          if git diff --cached --quiet; then
            echo "No param changes to commit"
          else
            git commit -m "[optimizer] nightly tune $(date -u +%Y-%m-%d)"
            git pull --rebase origin main  # push-race insurance (R5.2): Sunday loops race to main
            git push
          fi
