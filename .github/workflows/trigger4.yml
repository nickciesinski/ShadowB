name: Trigger 4 — MLB + NBA Predictions

on:
  schedule:
    - cron: '0 7 * * *'  # 3:00 AM EDT = 07:00 UTC
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Generate MLB + NBA predictions
        run: node src/triggers.js trigger4
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # 2026-07-09: goalie-data.js reads the 'NHL Goalie Stats' rankings
          # sheet as the presumed-starter fallback for the NHL goalie adj.
          RANKINGS_SPREADSHEET_ID: ${{ secrets.RANKINGS_SPREADSHEET_ID }}
          NODE_ENV: production
