name: Backfill Stake Zero (manual)
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (report only, do not write)'
        required: false
        default: 'true'
      regrade:
        description: 'Also clear result so trigger12 can regrade'
        required: false
        default: 'false'
jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - run: npm install
      - name: Backfill stake-zero rows
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          if [ "${{ github.event.inputs.regrade }}" = "true" ]; then ARGS="$ARGS --regrade"; fi
          node scripts/backfill-stake-zero.js $ARGS
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          NODE_ENV: production
