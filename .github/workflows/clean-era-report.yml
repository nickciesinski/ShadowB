name: Clean-Era Staked ROI Report

on:
  schedule:
    # Sunday 12:30 UTC (8:30 AM ET) — after Saturday grading, before the tuners.
    - cron: '30 12 * * 0'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Generate clean-era report
        env:
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/clean-era-report.js
      - name: Commit report
        run: |
          git config user.name "shadow-bets-bot"
          git config user.email "shadow-bets-bot@users.noreply.github.com"
          git add clean-era-reports/
          git diff --cached --quiet && echo "No report change" && exit 0
          git commit -m "Clean-era staked ROI report — $(date +%Y-%m-%d) [skip ci]"
          git pull --rebase origin main
          git push
      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clean-era-report
          path: clean-era-reports/*.md
          if-no-files-found: ignore
