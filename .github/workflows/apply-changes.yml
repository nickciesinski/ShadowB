name: Apply pending changes (one-time)

on:
  workflow_dispatch:

jobs:
  apply:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Apply patch
        run: |
          echo "" | base64 -d | gunzip > /tmp/changes.patch
          git apply /tmp/changes.patch
          echo "Patch applied successfully"
          git diff --stat

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Remove OPENAI_API_KEY refs, add trigger16 health check, tighten MLB thresholds

          Changes:
          - Remove OPENAI_API_KEY from config.js, .env.example, and all 15 workflow files
          - Add sendTriggerHealthCheck() to emails.js (trigger16)
          - Add trigger16 entry to triggers.js
          - Create trigger16.yml workflow (7:30 AM ET daily health check)
          - Bump MLB minConfidence 5->6 in approval-engine.js

          Co-Authored-By: Claude <noreply@anthropic.com>"
          git push origin main
          echo "Changes pushed successfully"

      - name: Clean up this workflow
        run: |
          git rm .github/workflows/apply-changes.yml
          git commit -m "Remove one-time apply-changes workflow"
          git push origin main
