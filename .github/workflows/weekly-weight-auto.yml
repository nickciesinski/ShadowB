name: Weekly Weight Auto-Optimizer
on:
  schedule:
    # Run Sunday at 2:00 PM UTC (10:00 AM ET) — after trigger14 has graded Saturday's games
    - cron: '0 14 * * 0'
  workflow_dispatch:
    inputs:
      days:
        description: 'Lookback window (days)'
        required: false
        default: '60'
      dry_run:
        description: 'Dry run (analyze but do not apply)'
        required: false
        default: 'false'
      force:
        description: 'Force apply even if below threshold'
        required: false
        default: 'false'

jobs:
  auto-optimize:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - name: Run auto-apply weight optimizer
        id: sweep
        env:
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
        run: |
          ARGS="--days ${{ github.event.inputs.days || '60' }}"
          # 2026-07-09: R0.1's shell-level quarantine replaced by the promotion
          # state machine (src/promotion-state.js). Scheduled runs pass
          # --scheduled; the script only applies when the sweep has EARNED
          # promotion via 3 consecutive weeks of out-of-sample holdout lift,
          # and it self-demotes on holdout degradation. Manual dispatch and
          # force behave as before.
          if [ "${{ github.event_name }}" = "schedule" ]; then
            ARGS="$ARGS --scheduled"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          node scripts/auto-apply-weights.js $ARGS

      - name: Commit weights + promotion state
        run: |
          git config user.name "shadow-bets-bot"
          git config user.email "shadow-bets-bot@users.noreply.github.com"
          # Promotion state + weekly report are committed EVERY run — the
          # streak must persist across weeks. Weights only change on applies.
          git add config/weight-promotion-state.json weight-reviews/auto-apply-*.json
          if [ "${{ steps.sweep.outputs.applied }}" = "true" ]; then
            git add config/model-params.*.json
          fi
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          if [ "${{ steps.sweep.outputs.applied }}" = "true" ]; then
            MSG="auto-apply: ${{ steps.sweep.outputs.winner }} (+${{ steps.sweep.outputs.win_rate_lift }}% win rate, +${{ steps.sweep.outputs.roi_lift }}% ROI) [${{ steps.sweep.outputs.promotion_mode }}]"
          else
            EVENT="${{ steps.sweep.outputs.promotion_event }}"
            MSG="weight sweep: analysis-only [${{ steps.sweep.outputs.promotion_mode }}]${EVENT:+ — $EVENT} — promotion state updated"
          fi
          git commit -m "$MSG"
          # Rebase first: multiple workflows push to main on Sundays; without this
          # a non-fast-forward push is rejected and the apply silently evaporates.
          git pull --rebase origin main
          git push


      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auto-apply-report
          path: weight-reviews/auto-apply-*.json
          retention-days: 90
