name: Admin — Deep Weight Sweep (report-only)

# Runs scripts/deep-sweep.js: thousands of random weight configs per league,
# evaluated with expanding-window walk-forward folds. NEVER writes weights —
# commits JSON reports to weight-reviews/deep-sweep-<date>/ for review.

on:
  workflow_dispatch:
    inputs:
      days:
        description: 'Lookback window in days'
        required: false
        default: '150'
      configs:
        description: 'Random configs per league'
        required: false
        default: '1500'
      leagues:
        description: 'Comma-separated leagues'
        required: false
        default: 'MLB,NBA,NHL,NFL'

permissions:
  contents: write

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - name: Run deep sweep
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          node scripts/deep-sweep.js \
            --days "${{ github.event.inputs.days }}" \
            --configs "${{ github.event.inputs.configs }}" \
            --leagues "${{ github.event.inputs.leagues }}"

      - name: Commit reports
        run: |
          git config user.name "shadow-bets-bot"
          git config user.email "shadow-bets-bot@users.noreply.github.com"
          git add weight-reviews/deep-sweep-*
          git diff --cached --quiet && echo "No reports to commit" && exit 0
          git commit -m "deep-sweep: walk-forward reports (analysis only, no weight changes)"
          git pull --rebase origin main
          git push
